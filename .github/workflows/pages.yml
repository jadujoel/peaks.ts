name: Deploy main example to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build library
        run: bun run build

      - name: Build main example
        run: bun run example:build

      - name: Assemble site
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/dist
          cp workspaces/main-example/index.html _site/
          cp workspaces/main-example/style.css _site/
          cp -R workspaces/main-example/dist/. _site/dist/
          cp -R workspaces/main-example/public/. _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
